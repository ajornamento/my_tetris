<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임 허브</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      color: #eee;
      padding: 32px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header h1 {
      font-size: 42px;
      color: #e0e0ff;
      letter-spacing: 4px;
      text-shadow: 0 0 24px rgba(100, 100, 255, 0.5);
    }
    header p {
      margin-top: 8px;
      color: #555;
      font-size: 13px;
      letter-spacing: 2px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 880px;
    }

    .game-card {
      background: #16213e;
      border: 1px solid #2a2a5a;
      border-radius: 14px;
      padding: 32px 20px 24px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .game-card:hover {
      border-color: #5a5aaa;
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(80, 80, 200, 0.25);
    }
    .game-card:active { transform: translateY(-1px); }

    .game-card .icon {
      font-size: 52px;
      line-height: 1;
    }
    .game-card .name {
      font-size: 18px;
      font-weight: bold;
      color: #c8c8ff;
      letter-spacing: 1px;
    }
    .game-card .desc {
      font-size: 12px;
      color: #556;
      line-height: 1.6;
    }
    .game-card .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      letter-spacing: 1px;
    }
    .badge-ready {
      background: #1a3a1a;
      color: #4a8a4a;
      border: 1px solid #2a5a2a;
    }
    .badge-soon {
      background: #2a2a1a;
      color: #6a6a3a;
      border: 1px solid #4a4a2a;
    }

    .game-card.disabled {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }

    footer {
      margin-top: 56px;
      color: #333;
      font-size: 11px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<header>
  <h1>GAME HUB</h1>
  <p>플레이할 게임을 선택하세요</p>
</header>

<div class="game-grid">

  <a class="game-card" href="tetris.html">
    <span class="badge badge-ready">PLAY</span>
    <div class="icon">🟦</div>
    <div class="name">테트리스</div>
    <div class="desc">블록을 쌓아 줄을 완성하세요.<br>최고점수에 도전!</div>
  </a>

  <div class="game-card disabled">
    <span class="badge badge-soon">SOON</span>
    <div class="icon">🐍</div>
    <div class="name">스네이크</div>
    <div class="desc">먹이를 먹으며 뱀을 길게<br>키워 나가세요.</div>
  </div>

  <a class="game-card" href="minesweeper.html">
    <span class="badge badge-ready">PLAY</span>
    <div class="icon">💣</div>
    <div class="name">지뢰찾기</div>
    <div class="desc">지뢰를 피해 모든 칸을<br>안전하게 열어보세요.</div>
  </a>

  <div class="game-card disabled">
    <span class="badge badge-soon">SOON</span>
    <div class="icon">🧱</div>
    <div class="name">벽돌깨기</div>
    <div class="desc">공을 튕겨 모든 벽돌을<br>부수세요.</div>
  </div>

</div>

<footer>© 2025 Game Hub</footer>

</body>
</html>
