<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>스네이크</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }
    #app {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    canvas {
      border: 2px solid #2a8a4a;
      background: #0d0d1a;
      display: block;
    }
    #sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 140px;
    }
    .panel {
      background: #16213e;
      border: 1px solid #2a5a3a;
      border-radius: 6px;
      padding: 12px;
    }
    .panel h3 {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .panel .value {
      font-size: 28px;
      font-weight: bold;
      color: #e0e0ff;
    }
    #btn-start, #btn-scores, #btn-hub {
      width: 100%;
      padding: 10px;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: background 0.2s;
    }
    #btn-start  { background: #2a6a3a; }
    #btn-scores { background: #2a4a2a; }
    #btn-hub    { background: #2a2a4a; }
    #btn-start:hover  { background: #3a8a5a; }
    #btn-scores:hover { background: #4a6a4a; }
    #btn-hub:hover    { background: #4a4a6a; }
    .keys {
      font-size: 11px;
      color: #666;
      line-height: 1.8;
    }
    /* 모바일 D-Pad */
    #dpad {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
    }
    .dpad-row { display: flex; gap: 4px; }
    .dpad-btn {
      width: 44px;
      height: 44px;
      background: #1e3a2a;
      border: 1px solid #2a5a3a;
      border-radius: 6px;
      color: #aaffcc;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .dpad-btn:active { background: #2a5a3a; }
    .dpad-center {
      width: 44px;
      height: 44px;
    }
    @media (max-width: 600px) {
      #app { flex-direction: column; align-items: center; gap: 16px; }
      #sidebar { min-width: unset; width: 100%; max-width: 320px; }
      #dpad { display: flex; }
    }
    /* 점수판 오버레이 */
    #scores-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 10;
      justify-content: center;
      align-items: center;
    }
    #scores-overlay.show { display: flex; }
    #scores-box {
      background: #16213e;
      border: 1px solid #2a5a3a;
      border-radius: 12px;
      padding: 28px 36px;
      min-width: 240px;
      text-align: center;
    }
    #scores-box h2 {
      color: #aaffcc;
      letter-spacing: 2px;
      margin-bottom: 20px;
      font-size: 18px;
    }
    #scores-list {
      list-style: none;
      margin-bottom: 20px;
      text-align: left;
    }
    #scores-list li {
      padding: 6px 0;
      border-bottom: 1px solid #223;
      font-size: 14px;
      color: #ccc;
      display: flex;
      justify-content: space-between;
      gap: 24px;
    }
    #scores-list li:last-child { border-bottom: none; }
    #scores-list .rank { color: #556; }
    #scores-list .hi { color: #aaffcc; }
    #btn-scores-close {
      padding: 8px 24px;
      background: #2a5a3a;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      cursor: pointer;
      font-size: 14px;
    }
    #btn-scores-close:hover { background: #3a8a5a; }
  </style>
</head>
<body>

<div id="app">
  <canvas id="canvas"></canvas>

  <div id="sidebar">
    <div class="panel">
      <h3>점수</h3>
      <div class="value" id="score-display">0</div>
    </div>
    <div class="panel">
      <h3>최고 점수</h3>
      <div class="value" id="best-display">0</div>
    </div>
    <div class="panel">
      <h3>레벨</h3>
      <div class="value" id="level-display">1</div>
    </div>
    <button id="btn-start">시작</button>
    <button id="btn-scores">최고 기록</button>
    <button id="btn-hub">← 허브</button>
    <div class="panel">
      <h3>조작</h3>
      <div class="keys">
        ↑ / W : 위<br>
        ↓ / S : 아래<br>
        ← / A : 왼쪽<br>
        → / D : 오른쪽<br>
        P : 일시정지
      </div>
    </div>
    <div id="dpad">
      <div class="dpad-row">
        <div class="dpad-center"></div>
        <button class="dpad-btn" data-dir="UP">▲</button>
        <div class="dpad-center"></div>
      </div>
      <div class="dpad-row">
        <button class="dpad-btn" data-dir="LEFT">◀</button>
        <button class="dpad-btn" data-dir="DOWN">▼</button>
        <button class="dpad-btn" data-dir="RIGHT">▶</button>
      </div>
    </div>
  </div>
</div>

<!-- 점수판 오버레이 -->
<div id="scores-overlay">
  <div id="scores-box">
    <h2>🏆 최고 기록</h2>
    <ol id="scores-list"></ol>
    <button id="btn-scores-close">닫기</button>
  </div>
</div>

<script>
  const COLS = 20, ROWS = 20, CELL = 24;
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;

  const scoreDisplay = document.getElementById('score-display');
  const bestDisplay  = document.getElementById('best-display');
  const levelDisplay = document.getElementById('level-display');

  /* ── 상수 ── */
  const DIR = { UP: {x:0,y:-1}, DOWN: {x:0,y:1}, LEFT: {x:-1,y:0}, RIGHT: {x:1,y:0} };
  const OPPOSITE = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };
  const BASE_INTERVAL = 180;   // ms (레벨1)
  const FOOD_SCORE    = 10;
  const BONUS_SCORE   = 50;    // 특별 먹이
  const LEVEL_STEP    = 5;     // 먹이 n개마다 레벨업

  /* ── 상태 ── */
  let snake, dir, nextDir, food, bonusFood, score, level, eaten;
  let state = 'idle'; // idle | running | paused | dead
  let loopId = null;
  let bonusTimer = null;

  /* ── 로컬스토리지 점수판 ── */
  const LS_KEY = 'snake_scores';
  function loadScores() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch { return []; }
  }
  function saveScore(s) {
    const list = loadScores();
    list.push(s);
    list.sort((a,b) => b-a);
    list.splice(10);
    localStorage.setItem(LS_KEY, JSON.stringify(list));
  }
  function bestScore() { const l = loadScores(); return l.length ? l[0] : 0; }

  /* ── 초기화 ── */
  function init() {
    snake = [
      {x: 10, y: 10},
      {x:  9, y: 10},
      {x:  8, y: 10},
    ];
    dir     = DIR.RIGHT;
    nextDir = DIR.RIGHT;
    food    = spawnFood();
    bonusFood = null;
    score   = 0;
    level   = 1;
    eaten   = 0;
    updateHUD();
    if (bonusTimer) { clearTimeout(bonusTimer); bonusTimer = null; }
  }

  function spawnFood(exclude) {
    const occupied = new Set((exclude || snake).map(p => `${p.x},${p.y}`));
    let pos;
    do {
      pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
    } while (occupied.has(`${pos.x},${pos.y}`));
    return pos;
  }

  function spawnBonus() {
    const occupied = new Set([...snake.map(p=>`${p.x},${p.y}`), `${food.x},${food.y}`]);
    let pos;
    let tries = 0;
    do {
      pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
      tries++;
    } while (occupied.has(`${pos.x},${pos.y}`) && tries < 200);
    bonusFood = pos;
    // 7초 후 사라짐
    bonusTimer = setTimeout(() => { bonusFood = null; }, 7000);
  }

  /* ── 게임 루프 ── */
  function interval() {
    return Math.max(60, BASE_INTERVAL - (level - 1) * 15);
  }

  function startLoop() {
    if (loopId) clearInterval(loopId);
    loopId = setInterval(step, interval());
  }

  function step() {
    if (state !== 'running') return;

    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 벽 충돌
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      die(); return;
    }
    // 자기 자신 충돌
    if (snake.some(p => p.x === head.x && p.y === head.y)) {
      die(); return;
    }

    snake.unshift(head);

    let grew = false;

    // 일반 먹이
    if (head.x === food.x && head.y === food.y) {
      score += FOOD_SCORE * level;
      eaten++;
      grew = true;
      food = spawnFood();

      // 레벨업
      const newLevel = Math.floor(eaten / LEVEL_STEP) + 1;
      if (newLevel > level) {
        level = newLevel;
        startLoop(); // 속도 갱신
      }

      // 5개마다 보너스 먹이 등장
      if (eaten % 5 === 0 && !bonusFood) {
        spawnBonus();
      }
    }

    // 보너스 먹이
    if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
      score += BONUS_SCORE * level;
      grew = true;
      bonusFood = null;
      if (bonusTimer) { clearTimeout(bonusTimer); bonusTimer = null; }
    }

    if (!grew) snake.pop();

    updateHUD();
    draw();
  }

  function die() {
    state = 'dead';
    clearInterval(loopId); loopId = null;
    if (bonusTimer) { clearTimeout(bonusTimer); bonusTimer = null; }
    saveScore(score);
    updateHUD();
    draw();
    drawOverlay('GAME OVER', `점수: ${score}`);
    document.getElementById('btn-start').textContent = '다시 시작';
  }

  /* ── 그리기 ── */
  const GREEN_HEAD  = '#aaffaa';
  const GREEN_BODY  = '#22cc66';
  const GREEN_DARK  = '#118844';
  const FOOD_COLOR  = '#ff5555';
  const BONUS_COLOR = '#ffdd00';
  const GRID_COLOR  = '#111820';

  function draw() {
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 격자
    ctx.strokeStyle = GRID_COLOR;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(canvas.width, y*CELL); ctx.stroke();
    }

    // 뱀
    snake.forEach((seg, i) => {
      const x = seg.x * CELL, y = seg.y * CELL;
      ctx.fillStyle = i === 0 ? GREEN_HEAD : (i % 2 === 0 ? GREEN_BODY : GREEN_DARK);
      roundRect(ctx, x+1, y+1, CELL-2, CELL-2, 4);
      ctx.fill();
    });

    // 눈
    if (snake.length > 0) {
      const h = snake[0];
      ctx.fillStyle = '#003300';
      const ex = h.x * CELL + CELL/2, ey = h.y * CELL + CELL/2;
      const offsets = dir === DIR.UP    ? [[-4,-3],[4,-3]]
                    : dir === DIR.DOWN  ? [[-4, 3],[4, 3]]
                    : dir === DIR.LEFT  ? [[-3,-4],[-3,4]]
                    :                    [[ 3,-4],[3, 4]];
      offsets.forEach(([ox,oy]) => {
        ctx.beginPath();
        ctx.arc(ex+ox, ey+oy, 2.5, 0, Math.PI*2);
        ctx.fill();
      });
    }

    // 일반 먹이 (빨간 원)
    const fx = food.x * CELL + CELL/2, fy = food.y * CELL + CELL/2;
    ctx.fillStyle = FOOD_COLOR;
    ctx.beginPath(); ctx.arc(fx, fy, CELL/2 - 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff9999';
    ctx.beginPath(); ctx.arc(fx - 2, fy - 2, 3, 0, Math.PI*2); ctx.fill();

    // 보너스 먹이 (별)
    if (bonusFood) {
      drawStar(bonusFood.x * CELL + CELL/2, bonusFood.y * CELL + CELL/2, 5, CELL/2-2, CELL/4);
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  function drawStar(cx, cy, spikes, outer, inner) {
    let rot = (Math.PI / 2) * 3, step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outer);
    for (let i = 0; i < spikes; i++) {
      ctx.lineTo(cx + Math.cos(rot) * outer, cy + Math.sin(rot) * outer);
      rot += step;
      ctx.lineTo(cx + Math.cos(rot) * inner, cy + Math.sin(rot) * inner);
      rot += step;
    }
    ctx.closePath();
    ctx.fillStyle = BONUS_COLOR;
    ctx.fill();
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawOverlay(title, sub) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#aaffaa';
    ctx.font = 'bold 36px Courier New';
    ctx.fillText(title, canvas.width/2, canvas.height/2 - 20);
    ctx.fillStyle = '#88cc88';
    ctx.font = '18px Courier New';
    ctx.fillText(sub, canvas.width/2, canvas.height/2 + 18);
    if (state === 'idle') {
      ctx.fillStyle = '#556655';
      ctx.font = '14px Courier New';
      ctx.fillText('시작 버튼을 누르세요', canvas.width/2, canvas.height/2 + 48);
    }
  }

  function drawPauseOverlay() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#aaffaa';
    ctx.font = 'bold 32px Courier New';
    ctx.fillText('PAUSE', canvas.width/2, canvas.height/2);
  }

  function updateHUD() {
    scoreDisplay.textContent = score;
    levelDisplay.textContent = level;
    const best = bestScore();
    bestDisplay.textContent  = best;
  }

  /* ── 컨트롤 ── */
  document.getElementById('btn-start').addEventListener('click', () => {
    if (state === 'running') return;
    init();
    state = 'running';
    document.getElementById('btn-start').textContent = '진행 중';
    startLoop();
    draw();
  });

  document.getElementById('btn-hub').addEventListener('click', () => {
    window.location.href = 'index.html';
  });

  /* 점수판 */
  document.getElementById('btn-scores').addEventListener('click', showScores);
  document.getElementById('btn-scores-close').addEventListener('click', () => {
    document.getElementById('scores-overlay').classList.remove('show');
  });

  function showScores() {
    const list = loadScores();
    const ol = document.getElementById('scores-list');
    ol.innerHTML = '';
    if (list.length === 0) {
      ol.innerHTML = '<li style="color:#556;justify-content:center;">기록 없음</li>';
    } else {
      list.forEach((s, i) => {
        const li = document.createElement('li');
        li.innerHTML = `<span class="rank">#${i+1}</span><span class="hi">${s}</span>`;
        ol.appendChild(li);
      });
    }
    document.getElementById('scores-overlay').classList.add('show');
  }

  /* 키보드 */
  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp:'UP', ArrowDown:'DOWN', ArrowLeft:'LEFT', ArrowRight:'RIGHT',
      w:'UP', s:'DOWN', a:'LEFT', d:'RIGHT',
      W:'UP', S:'DOWN', A:'LEFT', D:'RIGHT',
    };
    if (map[e.key]) {
      e.preventDefault();
      const wanted = map[e.key];
      if (wanted !== OPPOSITE[Object.keys(DIR).find(k => DIR[k] === dir)]) {
        nextDir = DIR[wanted];
      }
    }
    if (e.key === 'p' || e.key === 'P') togglePause();
  });

  function togglePause() {
    if (state === 'running') {
      state = 'paused';
      drawPauseOverlay();
    } else if (state === 'paused') {
      state = 'running';
      draw();
    }
  }

  /* 모바일 D-Pad */
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      const wanted = btn.dataset.dir;
      const curKey = Object.keys(DIR).find(k => DIR[k] === dir);
      if (wanted !== OPPOSITE[curKey]) nextDir = DIR[wanted];
    }, { passive: false });
    btn.addEventListener('click', () => {
      const wanted = btn.dataset.dir;
      const curKey = Object.keys(DIR).find(k => DIR[k] === dir);
      if (wanted !== OPPOSITE[curKey]) nextDir = DIR[wanted];
    });
  });

  /* 스와이프 */
  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    let wanted;
    if (Math.abs(dx) > Math.abs(dy)) {
      wanted = dx > 0 ? 'RIGHT' : 'LEFT';
    } else {
      wanted = dy > 0 ? 'DOWN' : 'UP';
    }
    const curKey = Object.keys(DIR).find(k => DIR[k] === dir);
    if (wanted !== OPPOSITE[curKey]) nextDir = DIR[wanted];
  }, { passive: true });

  /* ── 시작 화면 ── */
  init();
  draw();
  drawOverlay('SNAKE', '');
</script>
</body>
</html>
